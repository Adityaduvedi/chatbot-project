<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant</title>

    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="/static/style.css">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <div class="ambient-bg"></div>

    <div class="chat-container">

        <!-- HEADER -->
        <header class="chat-header">
            <div class="header-info">
                <h1>🤖 AI Assistant</h1>
                <p>Smart • Fast • Local AI</p>
            </div>
        </header>

        <!-- CHAT BOX -->
        <main class="chat-box" id="chat-box">

            <!-- Default message -->
            <div class="message bot-message">
                <div class="avatar"><i class="fas fa-sparkles"></i></div>
                <div class="text">Start chatting with AI 🤖</div>
            </div>

        </main>

        <!-- TYPING INDICATOR -->
        <div id="typing-indicator" class="typing hidden">
            <div class="avatar"><i class="fas fa-sparkles"></i></div>
            <div class="dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>

        <!-- INPUT -->
        <div class="input-wrapper">
            <form class="chat-input-area" id="chat-form">
                <input type="text" id="user-input" placeholder="Type something..." autocomplete="off" required>
                <!-- VOICE ANIMATION -->
                <canvas id="voice-canvas" class="voice-canvas hidden"></canvas>
                <button type="button" id="mic-btn" class="mic-btn" title="Click to speak">
                    <i class="fa fa-microphone"></i>
                </button>
                <button type="submit" id="send-btn" class="send-btn">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </form>
        </div>

    </div>

    <script src="/static/script.js"></script>

</body>

</html>
