<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="ambient-bg"></div>
    <div class="chat-container">
        <header class="chat-header">
            <div class="header-info">
                <h1>AI Assistant</h1>
                <p>Powered by DialoGPT & Wikipedia</p>
            </div>
            <button id="theme-toggle" style="display: none;"></button>
        </header>

        <main class="chat-box" id="chat-box">
            <div class="message bot-message">
                <div class="avatar"><i class="fas fa-sparkles"></i></div>
                <div class="text">Hi there! 👋 I'm your AI assistant. Ask me anything!</div>
            </div>
        </main>

        <div class="input-wrapper">
            <form class="chat-input-area" id="chat-form">
                <input type="text" id="user-input" placeholder="Ask me anything..." autocomplete="off" required>
                <button type="submit" id="send-btn" class="send-btn"><i class="fas fa-paper-plane"></i></button>
            </form>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
